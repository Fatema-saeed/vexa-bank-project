  <!-- Login Form -->
  <main class="flex-grow-1 d-flex justify-content-center align-items-center py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-7 col-lg-5">

          <div class="card shadow-lg border-0 rounded-4">
            <div class="card-header bg-danger text-white text-center fw-bold fs-4 py-3 rounded-top-4">
              Sign In to VexaBank
            </div>

            <div class="card-body p-4">

              <form id="loginForm" action="./pages/login.php" method="post" onsubmit="return validateLoginForm();" novalidate>                <div class="mb-3">
                  <label for="email" class="form-label fw-bold">Email Address</label>
                 <input
                      type="email"
  class="form-control"
  id="email"
  name="email"
  placeholder="example@email.com"
>
                  <div class="invalid-feedback" id="emailFeedback"></div>
                </div>

                <div class="mb-4">
                  <label for="password" class="form-label fw-bold">Password</label>
                  <input
                    type="password"
                    class="form-control"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                  >
                  <div class="invalid-feedback" id="passwordFeedback"></div>
                  
                </div>

                <div class="d-grid">
                  <button type="submit" class="btn btn-danger btn-lg fw-bold">
                    Login
                  </button>
                </div>

              </form>

            </div>
          </div>

        </div>

<script>
function validateLoginForm() {
  const email = document.getElementById("email");
  const password = document.getElementById("password");

  const emailFeedback = document.getElementById("emailFeedback");
  const passwordFeedback = document.getElementById("passwordFeedback");

  let isValid = true;

  email.classList.remove("is-valid", "is-invalid");
  password.classList.remove("is-valid", "is-invalid");

  const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if (!emailPattern.test(email.value.trim())) {
    email.classList.add("is-invalid");
    emailFeedback.textContent = "Please enter a valid email address.";
    isValid = false;
  } else {
    email.classList.add("is-valid");
  }

  const passwordPattern = /^(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*])[A-Za-z\d!@#$%^&*]{8,}$/;

if (password.value.trim().length < 6) {
  password.classList.add("is-invalid");
  passwordFeedback.textContent =
    "Password must be at least 6 characters long.";
  isValid = false;
} else {
  password.classList.add("is-valid");
}

  return isValid;
}
</script>
