<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - VexaBank</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
      <div class="container">
<div>
          <img src="/vexa logo.png" alt="VexaBank Logo" class="img-fluid" style="max-height: 40px;">
          <a class="navbar-brand fw-bold" href="../index.html">VexaBank</a>
        </div>        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain"
                aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarMain">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="pages/about.html">About Us</a></li>
            <li class="nav-item"><a class="nav-link" href="pages/contact.html">Contact Us</a></li>
            <li class="nav-item"><a class="nav-link active" href="login.html">Login</a></li>
            <li class="nav-item"><a class="nav-link" href="pages/dashboard.html">Dashboard</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

<main class="login-wrapper">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-6 col-lg-5">
          <div class="card login-card card-custom">
            <div class="card-header">Sign In</div>
            <div class="card-body p-4">
               <form action="https://httpbin.org/get" method="get">

                <div class="mb-3">
                  <label for="loginEmail" class="form-label">Email</label>
                  <input type="email" class="form-control" id="loginEmail" name="email"
                         placeholder="your@email.com" required>
                </div>
                <div class="mb-3">
                  <label for="loginPassword" class="form-label">Password</label>
                  <input type="password" class="form-control" id="loginPassword" name="password" 
                         placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer-custom mt-auto">
    <div class="container text-center">
      <p class="mb-0">&copy; 2025 VexaBank. Academic Project.</p>
    </div>
  </footer>

</body>
</html>
