  <main class="flex-grow-1 py-5">
    <div class="container">
      <div class="text-center mb-4">
        <h1 class="fw-bold">Customer Profiles</h1>
        <p class="text-muted">Add, search, and display customer profiles dynamically.</p>
      </div>

      <div class="card shadow-sm border-0 rounded-4 mb-4">
        <div class="card-header bg-danger text-white fw-bold">Add New Customer</div>
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-3">
              <input type="text" id="name" class="form-control" placeholder="Full Name">
            </div>
            <div class="col-md-3">
              <input type="email" id="email" class="form-control" placeholder="Email">
            </div>
            <div class="col-md-2">
              <input type="text" id="account" class="form-control" placeholder="Account No.">
            </div>
            <div class="col-md-2">
              <input type="text" id="phone" class="form-control" placeholder="Phone Number">
            </div>
            <div class="col-md-1">
              <select id="security" class="form-select">
                <option>Enabled</option>
                <option>Disabled</option>
              </select>
            </div>
            <div class="col-md-1 d-grid">
              <button class="btn btn-dark" onclick="addProfile()">Add</button>
            </div>
          </div>
        </div>
      </div>

      <div class="row justify-content-center mb-4">
        <div class="col-lg-6">
          <div class="input-group">
            <input type="text" id="profileSearchInput" class="form-control" placeholder="Search by name or email">
            <button class="btn btn-danger" onclick="searchProfiles()">Search</button>
            <button class="btn btn-outline-secondary" onclick="displayProfiles(profiles)">Show All</button>
          </div>
        </div>
      </div>

      <div class="card shadow-sm border-0 rounded-4">
        <div class="card-header bg-dark text-white fw-bold">Customer Accounts</div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Account Number</th>
                  <th>Phone</th>
                  <th>Security</th>
                </tr>
              </thead>
              <tbody id="profileTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-dark text-white text-center py-3 mt-auto border-top border-danger">
    <div class="container">
      <p class="mb-0">&copy; 2026 VexaBank.</p>
    </div>
  </footer>

  <script>
    /*
      Constructor function for creating customer profile objects.
      Each object stores name, email, account number, phone, and security status.
    */
    function CustomerProfile(name, email, account, phone, security) {
      this.name = name;
      this.email = email;
      this.account = account;
      this.phone = phone;
      this.security = security;
    }

    /*
      Array used to store customer profiles using real project-style data.
    */
    const profiles = [
      new CustomerProfile("Fatema Said Al-Daghishi", "s150733@student.squ.edu.om", "4521", "+967 79322075", "Enabled"),
      new CustomerProfile("Sumaiya Al-Sadi", "s147433@student.squ.edu.om", "8934", "+968 99887766", "Enabled")
    ];

    /*
      This function displays all profiles dynamically inside the table body.
    */
    function displayProfiles(data) {
      const tableBody = document.getElementById("profileTableBody");
      tableBody.innerHTML = "";

      data.forEach(function (profile) {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${profile.name}</td>
          <td>${profile.email}</td>
          <td class="font-monospace fw-bold">${profile.account}</td>
          <td>${profile.phone}</td>
          <td>
            <span class="badge ${profile.security === 'Enabled' ? 'bg-success' : 'bg-secondary'}">
              ${profile.security}
            </span>
          </td>
        `;

        tableBody.appendChild(row);
      });
    }

    /*
      This function adds a new profile object into the array,
      then refreshes the table display.
    */
    function addProfile() {
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const account = document.getElementById("account").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const security = document.getElementById("security").value;

      if (name === "" || email === "" || account === "" || phone === "") {
        alert("Please fill in all customer fields.");
        return;
      }

      const newProfile = new CustomerProfile(name, email, account, phone, security);
      profiles.push(newProfile);
      displayProfiles(profiles);
    }

    /*
      This function searches customer profiles by name or email.
    */
    function searchProfiles() {
      const value = document.getElementById("profileSearchInput").value.toLowerCase().trim();

      const filtered = profiles.filter(function (profile) {
        return (
          profile.name.toLowerCase().includes(value) ||
          profile.email.toLowerCase().includes(value)
        );
      });

      displayProfiles(filtered);
    }

    displayProfiles(profiles);
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
